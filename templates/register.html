{% extends "base.html" %}
{% block auth_content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register — CropYield AI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f3f7f4; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .auth-card { background: #fff; border-radius: 16px; border: 1px solid #e5e7eb; box-shadow: 0 4px 24px rgba(0,0,0,.07); padding: 40px; width: 100%; max-width: 420px; }
  .auth-logo { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; color: #1a6b3c; text-align: center; margin-bottom: 6px; }
  .auth-logo span { color: #f9a825; }
  .form-label { font-size: 13px; font-weight: 500; }
  .form-control { border-radius: 8px; border: 1px solid #d1d5db; font-size: 14px; padding: 10px 12px; }
  .form-control:focus { border-color: #1a6b3c; box-shadow: 0 0 0 3px rgba(26,107,60,.1); }
  .btn-reg { background: #1a6b3c; color: #fff; border: none; border-radius: 8px; width: 100%; padding: 11px; font-weight: 600; font-size: 15px; }
  .btn-reg:hover { background: #134f2d; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-logo"><i class="bi bi-flower1 me-1"></i>Crop<span>Yield AI</span></div>
  <p class="text-center text-muted mb-4" style="font-size:14px;">Create your account</p>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2 mb-3" style="font-size:13px;border-radius:8px;">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
    </div>
    <div class="mb-3">
      <label class="form-label">Farmer learning mode</label>
      <select name="education_level" class="form-control" required>
        <option value="illiterate">Picture and voice mode</option>
        <option value="literate">Study and graph mode</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Language</label>
      <select name="language" class="form-control" required>
        <option value="en">English</option>
        <option value="kn">Kannada</option>
        <option value="hi">Hindi</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="tel" name="phone" class="form-control" placeholder="Optional mobile number">
    </div>
    <div class="mb-4">
      <label class="form-label">Village / Location</label>
      <input type="text" name="location" class="form-control" placeholder="e.g. Mandya, Karnataka">
    </div>
    <button type="submit" class="btn-reg"><i class="bi bi-person-plus me-2"></i>Create Account</button>
  </form>
  <p class="text-center mt-3" style="font-size:13px;color:#6b7280;">Already have an account? <a href="/login" style="color:#1a6b3c;font-weight:600;">Sign In</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
{% endblock %}
